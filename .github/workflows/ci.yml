name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ruff Check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.14.14"
          args: "check . --output-format=github"

  validate-and-test:
    name: Validate And Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set Up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Dependencies
        run: uv sync --extra schema

      - name: Validate Portfolio Structure
        run: uv run rikdom validate --portfolio data-sample/portfolio.json

      - name: Run Unit Tests
        run: uv run python -m unittest discover -s tests -v
