<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:14px;">
  <div class="label-mono">Neutrals · warm Nordic paper to ink</div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:10px;">
    <div class="col">
      <div class="swatch" style="height:72px; background:#F4EFE6;"></div>
      <div style="font-family:var(--font-mono); font-size:11px;"><strong>Paper</strong><br>#F4EFE6</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:72px; background:#E9E2D4;"></div>
      <div style="font-family:var(--font-mono); font-size:11px;"><strong>Linen</strong><br>#E9E2D4</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:72px; background:#B8AE9E;"></div>
      <div style="font-family:var(--font-mono); font-size:11px;"><strong>Stone</strong><br>#B8AE9E</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:72px; background:#4A4239;"></div>
      <div style="font-family:var(--font-mono); font-size:11px;"><strong>Graphite</strong><br>#4A4239</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:72px; background:#1F1A14;"></div>
      <div style="font-family:var(--font-mono); font-size:11px;"><strong>Ink</strong><br>#1F1A14</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:72px; background:#14161A;"></div>
      <div style="font-family:var(--font-mono); font-size:11px;"><strong>Midnight</strong><br>#14161A</div>
    </div>
  </div>
</div>
</body>
</html>
