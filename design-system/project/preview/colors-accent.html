<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Accent · the only brand color</div>
  <div style="display:grid; grid-template-columns: 120px 1fr; gap:20px; align-items:center;">
    <div class="swatch" style="height:120px; background:#2C4A6B;"></div>
    <div>
      <div style="font-family:var(--font-serif); font-size:28px; line-height:1.1; font-variation-settings:'opsz' 48;">Fjord</div>
      <div style="font-family:var(--font-mono); font-size:13px; color:var(--fg-2); margin-top:4px;">#2C4A6B · --fjord</div>
      <div style="font-family:var(--font-serif); font-size:14px; color:var(--graphite); margin-top:10px; max-width:440px;">Used for links, focus rings, and the primary button only. Restraint is the point — one accent keeps the page quiet.</div>
    </div>
  </div>
</div>
</body>
</html>
