<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Badges · asset class, status, delta</div>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; padding:3px 8px; border:1px solid #B8AE9E; border-radius:2px; color:#4A4239;">STOCK</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; padding:3px 8px; border:1px solid #B8AE9E; border-radius:2px; color:#4A4239;">REIT</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; padding:3px 8px; border:1px solid #B8AE9E; border-radius:2px; color:#4A4239;">FUND</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; padding:3px 8px; border:1px solid #B8AE9E; border-radius:2px; color:#4A4239;">REAL ESTATE</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; padding:3px 8px; border:1px solid #B8AE9E; border-radius:2px; color:#4A4239;">CASH</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; padding:3px 8px; border:1px solid #B8AE9E; border-radius:2px; color:#4A4239;">CRYPTO</span>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <span style="font-family:var(--font-mono); font-size:11px; padding:3px 8px; border-radius:2px; background:rgba(95,107,58,0.15); color:#3F4A1F;">◆ up to date</span>
    <span style="font-family:var(--font-mono); font-size:11px; padding:3px 8px; border-radius:2px; background:rgba(185,138,44,0.15); color:#7A5A1A;">◆ due this month</span>
    <span style="font-family:var(--font-mono); font-size:11px; padding:3px 8px; border-radius:2px; background:rgba(138,58,31,0.15); color:#6A2A14;">◆ overdue</span>
    <span style="font-family:var(--font-mono); font-size:11px; padding:3px 8px; border-radius:2px; background:rgba(44,74,107,0.12); color:#1F3550;">◆ plugin</span>
  </div>
</div>
</body>
</html>
