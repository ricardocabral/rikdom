<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Cards · flat, hairline, generous padding</div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
    <div style="background:#E9E2D4; border:1px solid #B8AE9E; border-radius:4px; padding:20px;">
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2); letter-spacing:0.06em; text-transform:uppercase;">Total value</div>
      <div style="font-family:var(--font-serif); font-size:32px; font-variation-settings:'opsz' 48; margin-top:6px; font-variant-numeric: tabular-nums;">1&nbsp;284&nbsp;500 <span style="font-size:16px; color:var(--fg-2);">NOK</span></div>
      <div style="font-family:var(--font-mono); font-size:12px; color:#5F6B3A; margin-top:4px;">+2.1% · 30d</div>
    </div>
    <div style="background:#F4EFE6; border:1px solid #B8AE9E; border-radius:4px; padding:20px;">
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2); letter-spacing:0.06em; text-transform:uppercase;">Holdings</div>
      <div style="font-family:var(--font-serif); font-size:32px; font-variation-settings:'opsz' 48; margin-top:6px;">34</div>
      <div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-2); margin-top:4px;">across 6 asset classes</div>
    </div>
  </div>
</div>
</body>
</html>
