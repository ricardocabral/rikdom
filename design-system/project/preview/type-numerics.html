<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Numerics · tabular, aligned, never decorative</div>
  <table style="border-collapse:collapse; width:100%; font-family:var(--font-mono); font-variant-numeric: tabular-nums;">
    <thead>
      <tr style="font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-2); border-bottom:1px solid var(--border-soft);">
        <th style="text-align:left; padding:8px 0;">Ticker</th>
        <th style="text-align:right; padding:8px 0;">Qty</th>
        <th style="text-align:right; padding:8px 0;">Value (NOK)</th>
        <th style="text-align:right; padding:8px 0;">Δ 30d</th>
      </tr>
    </thead>
    <tbody style="font-size:14px;">
      <tr><td style="padding:6px 0;">EQNR.OL</td><td style="text-align:right;">120</td><td style="text-align:right;">42&nbsp;840.00</td><td style="text-align:right; color:#5F6B3A;">+2.4%</td></tr>
      <tr><td style="padding:6px 0;">DNB.OL</td><td style="text-align:right;">85</td><td style="text-align:right;">19&nbsp;104.50</td><td style="text-align:right; color:#8A3A1F;">−0.8%</td></tr>
      <tr><td style="padding:6px 0;">NHY.OL</td><td style="text-align:right;">200</td><td style="text-align:right;">14&nbsp;260.00</td><td style="text-align:right; color:#5F6B3A;">+1.1%</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
