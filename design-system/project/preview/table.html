      <tr><td style="padding:8px 8px 8px 0;">Apt. Majorstuen</td><td style="padding:8px; font-family:var(--font-mono); font-size:11px; color:#4A4239;">REAL&nbsp;ESTATE</td><td style="text-align:right; padding:8px; font-family:var(--font-mono);">1</td><td style="text-align:right; padding:8px 0 8px 8px; font-family:var(--font-mono);">4 200 000</td></tr>

  </table>

</html>
