<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Radii · modest, never fully rounded</div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:16px;">
    <div style="text-align:center;">
      <div style="width:100%; aspect-ratio:2/1; background:#E9E2D4; border:1px solid #B8AE9E; border-radius:2px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;"><strong>2px</strong> · --radius-sm</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2);">inputs, chips</div>
    </div>
    <div style="text-align:center;">
      <div style="width:100%; aspect-ratio:2/1; background:#E9E2D4; border:1px solid #B8AE9E; border-radius:4px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;"><strong>4px</strong> · --radius</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2);">buttons, cards</div>
    </div>
    <div style="text-align:center;">
      <div style="width:100%; aspect-ratio:2/1; background:#E9E2D4; border:1px solid #B8AE9E; border-radius:8px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;"><strong>8px</strong> · --radius-lg</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2);">modals, panels</div>
    </div>
  </div>
</div>
</body>
</html>
