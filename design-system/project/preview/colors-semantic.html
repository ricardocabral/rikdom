<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Semantic · gain, loss, caution (muted earth, not traffic-light)</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:16px;">
    <div>
      <div class="swatch" style="height:64px; background:#5F6B3A;"></div>
      <div style="font-family:var(--font-mono); font-size:12px; margin-top:8px;"><strong>Moss</strong> · gain</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2);">#5F6B3A · --pos</div>
    </div>
    <div>
      <div class="swatch" style="height:64px; background:#8A3A1F;"></div>
      <div style="font-family:var(--font-mono); font-size:12px; margin-top:8px;"><strong>Rust</strong> · loss</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2);">#8A3A1F · --neg</div>
    </div>
    <div>
      <div class="swatch" style="height:64px; background:#B98A2C;"></div>
      <div style="font-family:var(--font-mono); font-size:12px; margin-top:8px;"><strong>Amber</strong> · caution</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2);">#B98A2C · --warn</div>
    </div>
  </div>
</div>
</body>
</html>
