<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding-bottom:36px;">
  <div class="label-mono">Elevation · hairlines first, shadows only for float</div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:end;">
    <div style="text-align:center;">
      <div style="background:#E9E2D4; border:1px solid #B8AE9E; border-radius:4px; height:90px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:8px;"><strong>Flat</strong> · default</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2);">1px solid Stone, no shadow</div>
    </div>
    <div style="text-align:center;">
      <div style="background:#F4EFE6; border-radius:8px; height:90px; box-shadow: 0 2px 12px rgba(31,26,20,0.08), 0 8px 32px rgba(31,26,20,0.06);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:8px;"><strong>Float</strong> · modals, dropdowns</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2);">--shadow-float</div>
    </div>
  </div>
</div>
</body>
</html>
