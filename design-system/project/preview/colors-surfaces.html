<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:#F4EFE6;">
  <div class="label-mono">Surface pairings · how backgrounds stack</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;">
    <div style="background:#F4EFE6; border:1px solid #B8AE9E; border-radius:4px; padding:18px; min-height:110px;">
      <div style="font-family:var(--font-mono); font-size:11px; color:#4A4239;">page bg</div>
      <div style="font-family:var(--font-serif); font-size:18px; margin-top:6px;">Paper</div>
      <div style="background:#E9E2D4; border:1px solid #B8AE9E; border-radius:4px; padding:8px 10px; margin-top:10px; font-family:var(--font-mono); font-size:11px;">Linen card</div>
    </div>
    <div style="background:#E9E2D4; border:1px solid #B8AE9E; border-radius:4px; padding:18px; min-height:110px;">
      <div style="font-family:var(--font-mono); font-size:11px; color:#4A4239;">page bg</div>
      <div style="font-family:var(--font-serif); font-size:18px; margin-top:6px;">Linen</div>
      <div style="background:#F4EFE6; border:1px solid #B8AE9E; border-radius:4px; padding:8px 10px; margin-top:10px; font-family:var(--font-mono); font-size:11px;">Paper card</div>
    </div>
    <div style="background:#14161A; border:1px solid #2E3138; border-radius:4px; padding:18px; min-height:110px; color:#E8E3D8;">
      <div style="font-family:var(--font-mono); font-size:11px; color:#B8B1A1;">dark bg</div>
      <div style="font-family:var(--font-serif); font-size:18px; margin-top:6px; color:#E8E3D8;">Midnight</div>
      <div style="background:#1B1E23; border:1px solid #2E3138; border-radius:4px; padding:8px 10px; margin-top:10px; font-family:var(--font-mono); font-size:11px; color:#E8E3D8;">Surface card</div>
    </div>
  </div>
</div>
</body>
</html>
