<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Motion · settle, never bounce</div>
  <div style="font-family:var(--font-mono); font-size:13px; line-height:1.9;">
    <div><span style="color:var(--fg-2);">--dur-micro&nbsp;&nbsp;</span>150ms &nbsp;·&nbsp; <span style="color:var(--fg-2);">hover, press</span></div>
    <div><span style="color:var(--fg-2);">--dur-std&nbsp;&nbsp;&nbsp;&nbsp;</span>240ms &nbsp;·&nbsp; <span style="color:var(--fg-2);">menus, toasts</span></div>
    <div><span style="color:var(--fg-2);">--dur-enter&nbsp;&nbsp;</span>400ms &nbsp;·&nbsp; <span style="color:var(--fg-2);">page enter, dashboard fade</span></div>
    <div style="margin-top:10px;"><span style="color:var(--fg-2);">--ease-settle</span> &nbsp; cubic-bezier(0.2, 0, 0, 1)</div>
  </div>
  <div style="font-family:var(--font-serif); font-size:14px; color:var(--graphite);">No springs, bounces, or elastic. Animations confirm; they don't entertain.</div>
</div>
</body>
</html>
