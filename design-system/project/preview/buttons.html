<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Buttons · primary, secondary, ghost</div>
  <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
    <button style="font-family:var(--font-serif); font-size:16px; font-weight:500; padding:10px 18px; background:#1F1A14; color:#F4EFE6; border:1px solid #1F1A14; border-radius:4px; cursor:pointer;">Run snapshot</button>
    <button style="font-family:var(--font-serif); font-size:16px; font-weight:500; padding:10px 18px; background:transparent; color:#1F1A14; border:1px solid #B8AE9E; border-radius:4px; cursor:pointer;">Cancel</button>
    <button style="font-family:var(--font-serif); font-size:16px; font-weight:500; padding:10px 18px; background:transparent; color:#2C4A6B; border:1px solid transparent; border-radius:4px; cursor:pointer; text-decoration:underline; text-underline-offset:3px;">Read docs</button>
    <button style="font-family:var(--font-serif); font-size:16px; font-weight:500; padding:10px 18px; background:#8A3A1F; color:#F4EFE6; border:1px solid #8A3A1F; border-radius:4px; cursor:pointer;">Delete</button>
  </div>
  <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2);">Primary · Secondary · Ghost · Destructive</div>
</div>
</body>
</html>
