<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Allocation bar · quiet stacked ratios</div>
  <div style="display:flex; width:100%; height:18px; border:1px solid #B8AE9E; border-radius:2px; overflow:hidden;">
    <div style="flex:42; background:#1F1A14;"></div>
    <div style="flex:24; background:#4A4239;"></div>
    <div style="flex:15; background:#8A7A64;"></div>
    <div style="flex:10; background:#B8AE9E;"></div>
    <div style="flex:6; background:#2C4A6B;"></div>
    <div style="flex:3; background:#5F6B3A;"></div>
  </div>
  <div style="display:grid; grid-template-columns:repeat(3,auto); gap:4px 16px; font-family:var(--font-mono); font-size:11px; color:var(--fg-2);">
    <div><span style="display:inline-block; width:8px; height:8px; background:#1F1A14; margin-right:6px; vertical-align:middle;"></span>Real estate · 42%</div>
    <div><span style="display:inline-block; width:8px; height:8px; background:#4A4239; margin-right:6px; vertical-align:middle;"></span>Funds · 24%</div>
    <div><span style="display:inline-block; width:8px; height:8px; background:#8A7A64; margin-right:6px; vertical-align:middle;"></span>Stocks · 15%</div>
    <div><span style="display:inline-block; width:8px; height:8px; background:#B8AE9E; margin-right:6px; vertical-align:middle;"></span>Cash · 10%</div>
    <div><span style="display:inline-block; width:8px; height:8px; background:#2C4A6B; margin-right:6px; vertical-align:middle;"></span>Crypto · 6%</div>
    <div><span style="display:inline-block; width:8px; height:8px; background:#5F6B3A; margin-right:6px; vertical-align:middle;"></span>Other · 3%</div>
  </div>
</div>
</body>
</html>
