<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label-mono">Logo · wordmark + mark</div>
  <div style="display:grid; grid-template-columns: 1fr 100px; gap:24px; align-items:center;">
    <div style="background:#F4EFE6; border:1px solid #B8AE9E; border-radius:4px; padding:24px; display:flex; align-items:center; justify-content:center; min-height:120px;">
      <div style="font-family:var(--font-serif); font-size:56px; font-weight:400; color:#1F1A14; letter-spacing:-0.02em; font-variation-settings:'opsz' 144, 'SOFT' 50; line-height:1;">rikdom<span style="color:#2C4A6B;">.</span></div>
    </div>
    <div style="background:#F4EFE6; border:1px solid #B8AE9E; border-radius:8px; padding:0; display:flex; align-items:center; justify-content:center; aspect-ratio:1; position:relative;">
      <div style="font-family:var(--font-serif); font-size:72px; font-weight:400; color:#1F1A14; font-variation-settings:'opsz' 144, 'SOFT' 50; line-height:1;">r</div>
      <div style="position:absolute; right:20px; bottom:28px; width:8px; height:8px; background:#2C4A6B; border-radius:50%;"></div>
    </div>
  </div>
  <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2);">Fraunces, opsz 144, SOFT 50 · the dot is Fjord #2C4A6B · never rotate, never gradient-fill</div>
</div>
</body>
</html>
