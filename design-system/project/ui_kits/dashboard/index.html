<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>rikdom · dashboard</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--paper); }
  .dh-page { max-width: 1040px; margin: 0 auto; padding: 40px 32px 64px; }

  /* Header */
  .dh-header { display:flex; align-items:flex-end; gap:32px; border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:32px; }
  .dh-brand { display:flex; align-items:baseline; gap:2px; }
  .dh-wm { font-family:var(--font-serif); font-size:28px; font-weight:400; letter-spacing:-0.02em; font-variation-settings:'opsz' 144,'SOFT' 50; color:var(--ink); }
  .dh-dot { width:6px; height:6px; background:var(--fjord); border-radius:50%; display:inline-block; margin-left:2px; translate:0 -2px; }
  .dh-crumbs { font-family:var(--font-mono); font-size:12px; color:var(--fg-2); letter-spacing:0.04em; padding-bottom:2px; }
  .dh-sep { margin:0 8px; color:var(--fg-3); }
  .dh-meta { margin-left:auto; display:flex; gap:22px; font-family:var(--font-mono); font-size:11px; color:var(--fg-2); }
  .dh-meta-k { letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-3); margin-right:6px; }
  .dh-meta-v.mono, .mono { font-family:var(--font-mono); }

  /* Summary */
  .dh-summary { display:grid; grid-template-columns: 1fr auto; gap:40px; align-items:end; margin-bottom:48px; }
  .dh-eyebrow { font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); }
  .dh-hero { font-family:var(--font-serif); font-size:72px; font-weight:300; line-height:1; font-variation-settings:'opsz' 144,'SOFT' 50; letter-spacing:-0.02em; margin-top:10px; font-variant-numeric: tabular-nums; }
  .dh-hero-unit { font-size:20px; color:var(--fg-2); margin-left:6px; font-weight:400; font-variation-settings:'opsz' 24; }
  .dh-sub { margin-top:10px; font-family:var(--font-mono); font-size:13px; color:var(--fg-2); }
  .dh-sub-sep { margin:0 8px; color:var(--fg-3); }
  .dh-sub-muted { color:var(--fg-2); }
  .dh-delta-pos { color:var(--pos); }
  .dh-delta-neg { color:var(--neg); }
  .dh-summary-side { display:flex; gap:28px; padding-bottom:6px; }
  .dh-stat-k { font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); }
  .dh-stat-v { font-family:var(--font-serif); font-size:32px; font-weight:400; line-height:1.1; font-variation-settings:'opsz' 48; margin-top:6px; font-variant-numeric: tabular-nums; }

  /* Section */
  .dh-section { margin-bottom:40px; }
  .dh-section-title { margin-bottom:14px; }

  /* Allocation */
  .dh-alloc-bar { display:flex; width:100%; height:16px; border:1px solid var(--border); border-radius:2px; overflow:hidden; }
  .dh-alloc-legend { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:6px 28px; margin-top:14px; font-family:var(--font-mono); font-size:12px; }
  .dh-alloc-item { display:flex; align-items:center; gap:10px; }
  .dh-alloc-swatch { width:10px; height:10px; display:inline-block; }
  .dh-alloc-label { color:var(--ink); flex:1; }
  .dh-stat-v, .dh-hero { color: var(--ink); }
  .dh-alloc-pct { color:var(--fg-2); font-variant-numeric: tabular-nums; }

  /* Table */
  .dh-table { width:100%; border-collapse:collapse; font-family:var(--font-serif); font-variant-numeric: tabular-nums; }
  .dh-table thead th { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-2); font-weight:500; padding: 10px 8px; border-bottom:1px solid var(--border); }
  .dh-table tbody td { padding: 10px 8px; border-bottom:1px solid var(--border-soft); font-size:14px; }
  .dh-group-row td { background:transparent; border-bottom:1px solid var(--border); padding-top:18px; padding-bottom:6px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); }
  .dh-group-count { color:var(--fg-3); }
  .dh-row-sub { font-size:11px; color:var(--fg-2); font-family:var(--font-mono); margin-top:2px; }
  .dh-row-class { font-size:11px; color:var(--fg-2); text-transform:uppercase; letter-spacing:0.04em; }

  /* Operations */
  .dh-ops { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:14px; }
  .dh-op { border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; display:grid; grid-template-columns: 1fr auto; gap:6px 16px; align-items:center; background:var(--linen); }
  .dh-op-title { font-family:var(--font-serif); font-size:16px; }
  .dh-op-meta { grid-column:1/2; font-family:var(--font-mono); font-size:12px; color:var(--fg-2); display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .dh-op-status { grid-row:1/3; grid-column:2/3; font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; padding:4px 10px; border-radius:2px; }
  .dh-op-ok .dh-op-status { background: rgba(95,107,58,0.15); color:#3F4A1F; }
  .dh-op-due .dh-op-status { background: rgba(185,138,44,0.18); color:#7A5A1A; }
  .dh-op-over .dh-op-status { background: rgba(138,58,31,0.15); color:#6A2A14; }

  /* Chart */
  .dh-chart { background: var(--paper); display:block; }

  /* Footer */
  .dh-foot { margin-top:48px; padding-top:18px; border-top:1px solid var(--border); font-family:var(--font-mono); font-size:11px; color:var(--fg-2); display:flex; gap:14px; }
</style>
</head>
